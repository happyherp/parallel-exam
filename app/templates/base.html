<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Generador de Exámenes Paralelos{% endblock %}</title>

  <!-- KaTeX for math rendering -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
          onload="initKatex()"></script>

  <!-- HTMX for progressive enhancement -->
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>

  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <div class="container">
      <h1>Generador de Exámenes Paralelos</h1>
      {% block header_sub %}{% endblock %}
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    function initKatex() {
      const opts = {
        delimiters: [
          {left: "\\(", right: "\\)", display: false},
          {left: "\\[", right: "\\]", display: true},
        ],
        throwOnError: false,
      };
      renderMathInElement(document.body, opts);

      // Re-render after every HTMX swap so new math is processed.
      document.addEventListener("htmx:afterSwap", (evt) => {
        renderMathInElement(evt.detail.target, opts);
      });
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
