{% extends "base.html" %}

{% block content %}
<div class="upload-card">
  <h2>Subir examen</h2>
  <p>Sube un archivo <strong>.docx</strong> con el examen original.<br>
     Se generarán variantes paralelas de cada problema.</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="post" action="/upload" enctype="multipart/form-data">
    <div class="file-input-wrap">
      <input type="file" name="file" accept=".docx" required>
      <button type="submit" class="btn btn-primary">Procesar examen</button>
    </div>
  </form>
</div>
{% endblock %}
