app = "parallel-exam"
primary_region = "mad"  # Madrid — closest fly region to Spain

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0  # scale to zero when idle — fine for personal use
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024  # SymPy + pandoc can spike; 512MB is tight

[env]
  ENVIRONMENT = "production"

# Set ANTHROPIC_API_KEY via:  fly secrets set ANTHROPIC_API_KEY=sk-...
